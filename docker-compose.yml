x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.0
  environment:
    - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CELERY__BROKER_URL=redis://@redis:6379/0
    - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - APP_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NIM_MODEL=${NIM_MODEL:-qwen/qwen2.5-coder-7b-instruct}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://admin:adminpassword@postgres:5432/natwest_db}
      - WREN_ENGINE_URL=http://wren-engine:8080
      - WREN_AI_SERVICE_URL=http://wren-ai-service:5555
      - MINDSDB_API_URL=http://mindsdb:47334/api/sql
      - AIRFLOW_BASE_URL=http://airflow-webserver:8080
      - AIRFLOW_USERNAME=airflow
      - AIRFLOW_PASSWORD=airflow
      - CUBE_BASE_URL=http://cubejs:4000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      mindsdb:
        condition: service_started
      wren-ai-service:
        condition: service_started
      wren-engine:
        condition: service_started
      airflow-webserver:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - API_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: natwest_db
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./infra/init_dbs.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "natwest_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=airflow
      - _AIRFLOW_WWW_USER_PASSWORD=airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:adminpassword@postgres:5432/airflow
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:adminpassword@postgres:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://admin:adminpassword@postgres:5432/airflow

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:adminpassword@postgres:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://admin:adminpassword@postgres:5432/airflow

  mindsdb:
    image: mindsdb/mindsdb
    ports:
      - '47334:47334'
      - '47335:47335'
    volumes:
      - ./data/mindsdb_data:/root/mindsdb_data
    depends_on:
      postgres:
        condition: service_healthy

  cubejs:
    image: cubejs/cube:latest
    ports:
      - 4000:4000
      - 3000:3000
    environment:
      - CUBEJS_DB_TYPE=postgres
      - CUBEJS_DB_HOST=postgres
      - CUBEJS_DB_NAME=natwest_db
      - CUBEJS_DB_USER=admin
      - CUBEJS_DB_PASS=adminpassword
      - CUBEJS_DB_PORT=5432
      - CUBEJS_DEV_MODE=true
    volumes:
      - ./cube/schema:/cube/conf/schema
    depends_on:
      postgres:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./data/qdrant_data:/qdrant/storage

  wren-engine:
    image: ghcr.io/canner/wren-engine:latest
    ports:
      - 8081:8080
    environment:
      - WREN_ENGINE_SQL_PORT=8080

  wren-ai-service:
    image: ghcr.io/canner/wren-ai-service:latest
    ports:
      - 5555:5555
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - LLM_PROVIDER=openai
      - OPENAI_API_BASE=https://integrate.api.nvidia.com/v1
      - OPENAI_API_KEY=${NVIDIA_API_KEY}
      - LLM_MODEL=${NIM_MODEL:-qwen/qwen2.5-coder-7b-instruct}
    depends_on:
      - qdrant

  wren-ui:
    image: ghcr.io/canner/wren-ui:latest
    ports:
      - 3001:3000
    environment:
      - NEXT_PUBLIC_WREN_ENGINE_ENDPOINT=http://localhost:8081
      - NEXT_PUBLIC_WREN_AI_ENDPOINT=http://localhost:5555
    depends_on:
      - wren-engine
      - wren-ai-service

volumes:
  postgres_data:
  mindsdb_data:
  qdrant_data:
