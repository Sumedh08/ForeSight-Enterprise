x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.0
  environment:
    - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__CELERY__BROKER_URL=redis://@redis:6379/0
    - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  depends_on:
    redis:
      condition: service_started
    postgres:
      condition: service_started

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    deploy:
      resources:
        limits:
          memory: 1536M
    environment:
      - APP_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NIM_MODEL=${NIM_MODEL:-meta/llama-3.1-8b-instruct}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://admin:adminpassword@postgres:5432/natwest_db}
      - MINDSDB_API_URL=http://mindsdb:47334/api/sql/query
      - AIRFLOW_BASE_URL=http://airflow-webserver:8080
      - AIRFLOW_USERNAME=airflow
      - AIRFLOW_PASSWORD=airflow
      - CUBE_BASE_URL=http://cubejs:4000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_started
      mindsdb:
        condition: service_started
      airflow-webserver:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - API_URL=http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    depends_on:
      - backend

  postgres:
    image: postgres:15
    deploy:
      resources:
        limits:
          memory: 400M
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: natwest_db
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./infra/init_dbs.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "natwest_db"]
      interval: 5s
      retries: 5

  redis:
    image: redis:latest
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 30s
      retries: 50

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=airflow
      - _AIRFLOW_WWW_USER_PASSWORD=airflow
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:adminpassword@postgres:5432/airflow
    depends_on:
      postgres:
        condition: service_started

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    deploy:
      resources:
        limits:
          memory: 768M
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 45s
      timeout: 20s
      retries: 5
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:adminpassword@postgres:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://admin:adminpassword@postgres:5432/airflow

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    deploy:
      resources:
        limits:
          memory: 768M
    restart: always
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:adminpassword@postgres:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://admin:adminpassword@postgres:5432/airflow

  mindsdb:
    image: mindsdb/mindsdb
    deploy:
      resources:
        limits:
          memory: 1536M
    ports:
      - '47334:47334'
      - '47335:47335'
    volumes:
      - ./data/mindsdb_data:/root/mindsdb_data
    depends_on:
      postgres:
        condition: service_started

  cubejs:
    image: cubejs/cube:latest
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - 4000:4000
      - 3000:3000
    environment:
      - CUBEJS_DB_TYPE=postgres
      - CUBEJS_DB_HOST=postgres
      - CUBEJS_DB_NAME=natwest_db
      - CUBEJS_DB_USER=admin
      - CUBEJS_DB_PASS=adminpassword
      - CUBEJS_DB_PORT=5432
      - CUBEJS_DEV_MODE=true
    volumes:
      - ./cube/schema:/cube/conf/schema
    depends_on:
      postgres:
        condition: service_started


volumes:
  postgres_data:
  mindsdb_data:
